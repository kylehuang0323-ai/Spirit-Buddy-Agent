<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精神搭子</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
    <!-- 顶栏 -->
    <div id="topbar">
        <span class="brand">🧸 精神搭子</span>
        <div>
            <a href="/diary" class="btn btn-sm btn-outline-light">📊 情绪日记</a>
            <button class="btn btn-sm btn-outline-light ms-2" onclick="clearChat()">🗑️ 新对话</button>
        </div>
    </div>

    <!-- 消息区 -->
    <div id="messages">
        <div class="msg bot">
            <div class="bubble">嘿～我是你的搭子 🧸<br>今天过得怎么样？有什么想聊的，或者只是想有人陪着也行～</div>
        </div>
    </div>

    <!-- 输入区 -->
    <div id="input-area">
        <form onsubmit="send(event)">
            <div class="input-group">
                <input id="msg-input" type="text" class="form-control" placeholder="跟搭子说点什么..." autocomplete="off">
                <button class="btn btn-primary" type="submit">发送</button>
            </div>
        </form>
    </div>
</div>

<script>
const msgBox = document.getElementById('messages');
const input = document.getElementById('msg-input');

function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="bubble">' + escHtml(text).replace(/\n/g, '<br>') + '</div>';
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
    return div;
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send(e) {
    e.preventDefault();
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    addMsg('user', msg);
    const loading = addMsg('bot', '搭子正在想...');
    loading.querySelector('.bubble').classList.add('loading');

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        const data = await res.json();
        loading.remove();
        addMsg('bot', data.reply || '搭子走神了，再说一次？');
        if (data.mood_recorded) {
            addMsg('system', '✅ 已记录今天的心情');
        }
    } catch (err) {
        loading.remove();
        addMsg('bot', '❌ 搭子掉线了: ' + err.message);
    }
}

async function clearChat() {
    await fetch('/api/chat/clear', {method: 'POST'});
    msgBox.innerHTML = '';
    addMsg('bot', '新的一天，新的开始～有什么想聊的吗？🧸');
}
</script>
</body>
</html>
